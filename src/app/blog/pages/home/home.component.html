<mat-toolbar
  [color]="'primary'"
  class="toolbar-container">
  <button
    mat-icon-button
    (click)="drawer.toggle()"
    aria-label="Toggle sidenav">
    <mat-icon>menu</mat-icon>
  </button>
  <span>
        Club Escalada Costa Blanca
      </span>
  <span
    class="example-spacer">
      </span>
</mat-toolbar>
<mat-sidenav-container
  class="sidenav-container"
  [hasBackdrop]="false">
  <mat-sidenav-content
    class="sidenav-content-container">
    <router-outlet></router-outlet>
    <app-footer></app-footer>
  </mat-sidenav-content>
  <mat-sidenav
    #drawer
    class="example-sidenav"
    mode="push"
    opened="false">
    <mat-toolbar>Menú</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item
         routerLink=""
         (click)="drawer.close()">
        <mat-icon class="margin-icon">people</mat-icon>
        Hazte socio
      </a>
      <a mat-list-item
         routerLink="/about"
         (click)="drawer.close()">
        <mat-icon class="margin-icon">info</mat-icon>
        Información
      </a>
      <a mat-list-item
         routerLink="/blog"
         (click)="drawer.close()">
        <mat-icon class="margin-icon">article</mat-icon>
        Blog
      </a>
      <a mat-list-item
         routerLink="/contacto"
         (click)="drawer.close()">
        <mat-icon class="margin-icon">mail</mat-icon>
        Contacto
      </a>
    </mat-nav-list>
  </mat-sidenav>
</mat-sidenav-container>

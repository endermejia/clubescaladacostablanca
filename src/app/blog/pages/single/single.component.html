<ng-container *ngIf="post?.content">
  <mat-card class="custom-mat-card-container">
    <mat-card-header>
      <mat-card-title>{{post.title}}</mat-card-title>
      <mat-card-subtitle>{{blogService.dateFormatted(post.published)}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="custom-mat-card-content" [innerHTML]="post.content"></div>
    </mat-card-content>
  </mat-card>
</ng-container>
<ng-container *ngIf="!post?.content">
  <mat-spinner class="custom-mat-spinner"></mat-spinner>
</ng-container>

<div>
  <form>
    <mat-form-field>
      <input
        matInput
        placeholder="Nombre"
        required>
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>
    <mat-form-field>
      <input
        matInput
        placeholder="Introduce tu email"
        required>
      <mat-icon matSuffix>alternate_email</mat-icon>
    </mat-form-field>
    <mat-form-field>
      <input type="tel" matInput placeholder="Teléfono" required>
      <mat-icon matSuffix>call</mat-icon>
    </mat-form-field>
    <mat-form-field>
      <input matInput
             placeholder="Asunto"
             required>
      <mat-icon matSuffix>create</mat-icon>
    </mat-form-field>
    <mat-form-field>
      <textarea matInput
                placeholder="Escribe tu consulta"
                required></textarea>
      <mat-icon matSuffix>message</mat-icon>
    </mat-form-field>
    <button
      mat-raised-button
      class="btn-custom">Enviar
      <mat-icon>send</mat-icon>
    </button>
  </form>
</div>
